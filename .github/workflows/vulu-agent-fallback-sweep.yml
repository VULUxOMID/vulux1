name: Vulu Agent Fallback Sweep

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  fallback-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger runner fallback sweep
        env:
          RUNNER_URL: ${{ vars.VULU_AGENT_RUNNER_URL }}
          VULU_AGENT_INTERNAL_TOKEN: ${{ secrets.VULU_AGENT_INTERNAL_TOKEN }}
        run: |
          if [ -z "$RUNNER_URL" ]; then
            echo "VULU_AGENT_RUNNER_URL is not configured"
            exit 1
          fi
          curl -sS -X POST "${RUNNER_URL}/internal/fallback-sweep" \
            -H "Authorization: Bearer ${VULU_AGENT_INTERNAL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{}'
