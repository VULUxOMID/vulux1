name: Vulu Agent Dispatch

on:
  repository_dispatch:
    types:
      - vulu-agent.run
  pull_request:
    types:
      - ready_for_review
      - synchronize
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  normalize-completion-signal:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/vulu-agent-runner/package-lock.json

      - name: Install runner deps
        run: npm install
        working-directory: tools/vulu-agent-runner

      - name: Dispatch Codex run from GitHub completion signal
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DISPATCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          VULU_AGENT_RUNNER_CONFIG: ${{ vars.VULU_AGENT_CONFIG || 'tools/vulu-agent-runner/config.example.json' }}
        run: npm run github-signal
        working-directory: tools/vulu-agent-runner

  run-codex:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: vulu-agent-${{ github.event.client_payload.runner.lockKey }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Prepare branch
        env:
          TARGET_BRANCH: ${{ github.event.client_payload.runner.branchName }}
        run: |
          git config user.name "vulu-agent-runner"
          git config user.email "actions@github.com"
          git checkout -B "${TARGET_BRANCH}"

      - name: Write prompt
        run: |
          mkdir -p .tmp
          cat <<'EOF' > .tmp/vulu-agent-prompt.txt
          ${{ github.event.client_payload.runner.prompt }}
          EOF

      - name: Run Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            -C "$GITHUB_WORKSPACE" \
            -o .tmp/codex-last-message.txt \
            - < .tmp/vulu-agent-prompt.txt

      - name: Commit and push changes if present
        id: commit_changes
        env:
          TARGET_BRANCH: ${{ github.event.client_payload.runner.branchName }}
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "codex: ${{ github.event.client_payload.runner.issue.identifier }} agent update"
          git push --set-upstream origin "${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.commit_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.client_payload.runner.branchName }}
          BASE_BRANCH: ${{ github.event.client_payload.runner.baseBranch }}
          ISSUE_KEY: ${{ github.event.client_payload.runner.issue.identifier }}
          ISSUE_TITLE: ${{ github.event.client_payload.runner.issue.title }}
        run: |
          if gh pr view "${TARGET_BRANCH}" >/dev/null 2>&1; then
            gh pr edit "${TARGET_BRANCH}" --title "[${ISSUE_KEY}] ${ISSUE_TITLE}" --body "Automated Codex follow-up for ${ISSUE_KEY}."
          else
            gh pr create \
              --head "${TARGET_BRANCH}" \
              --base "${BASE_BRANCH}" \
              --title "[${ISSUE_KEY}] ${ISSUE_TITLE}" \
              --body "Automated Codex follow-up for ${ISSUE_KEY}."
          fi

      - name: Comment back to Linear
        if: always() && github.event.client_payload.runner.issue.id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ISSUE_ID: ${{ github.event.client_payload.runner.issue.id }}
          ISSUE_KEY: ${{ github.event.client_payload.runner.issue.identifier }}
          ISSUE_TITLE: ${{ github.event.client_payload.runner.issue.title }}
          TARGET_BRANCH: ${{ github.event.client_payload.runner.branchName }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGED: ${{ steps.commit_changes.outputs.changed }}
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            exit 0
          fi
          if [ "$CHANGED" = "true" ]; then
            BODY="Codex run completed for ${ISSUE_KEY}. Branch: ${TARGET_BRANCH}. Workflow: ${RUN_URL}."
          else
            BODY="Codex run completed for ${ISSUE_KEY} with no code changes. Workflow: ${RUN_URL}."
          fi
          curl -sS https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg issueId "$ISSUE_ID" --arg body "$BODY" '{query:"mutation CommentCreate($issueId: String!, $body: String!) { commentCreate(input: { issueId: $issueId, body: $body }) { success } }", variables:{issueId:$issueId, body:$body}}')"
